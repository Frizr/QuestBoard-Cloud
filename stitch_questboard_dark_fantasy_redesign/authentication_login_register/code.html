<!DOCTYPE html>

<style>
        .glow-effect {
            box-shadow: 0 0 25px rgba(124, 58, 237, 0.15);
        }
        .glow-effect:hover {
            box-shadow: 0 0 35px rgba(124, 58, 237, 0.3);
        }
        .bg-hero-pattern {
            background-size: cover;
            background-position: center;
        }
        .tab-content {
            display: none;
            opacity: 0;
            transition: opacity 0.3s ease-in-out;
        }
        .tab-content.active {
            display: block;
            opacity: 1;
        }
    </style>

<body class="bg-background-main text-text-main min-h-screen flex items-center justify-center relative overflow-hidden font-body-md">
<!-- Atmospheric Background -->
<div class="absolute inset-0 z-0 bg-hero-pattern opacity-30" data-alt="A dark fantasy RPG landscape showing a majestic, imposing adventurer's guildhall at night. The scene is illuminated by cinematic, ethereal purple and gold magical glows against deep navy shadows. The architectural style is grand and mysterious, fitting a high-end gaming universe. The mood is epic and inviting, hinting at grand quests and hidden treasures within." style="background-image: url('https://lh3.googleusercontent.com/aida/AP1WRLurVFAOg5_VBgyr4bcFm_l04UrPuuA7Zchv4YQ0D3t41Kl5Vo4Ze-AbxgH7Gxk0q3Y2W_aA2HmeWWAphXqzQRmTKX5BVyJPPtm-LAkF7kxWtbeKuwfKhD_zNXzJtghY2msHYdbp1R1LBe2JDlnezEwp53T6dVAOgQ0qctnoKI_SR-pbURA5KzOhqw7_gdy-WcIBXGujp3mz9UKtyncPvKrkGDcJMF6di5pMYA7DptOsA6XtO4wvSH9n56D4');">
</div>
<!-- Magical Overlays -->
<div class="absolute top-[-10%] left-[-10%] w-[50%] h-[50%] bg-primary-container rounded-full blur-[120px] opacity-10 z-0"></div>
<div class="absolute bottom-[-10%] right-[-10%] w-[50%] h-[50%] bg-secondary rounded-full blur-[120px] opacity-5 z-0"></div>
<!-- Main Glassmorphism Container -->
<main class="relative z-10 w-full max-w-[440px] p-margin-mobile md:p-0">
<!-- Brand Header -->
<div class="text-center mb-8">
<h1 class="font-display-hero text-display-hero text-primary tracking-wider flex items-center justify-center gap-3">
<span class="material-symbols-outlined text-[40px]" style="font-variation-settings: 'FILL' 1;">military_tech</span>
                QuestBoard
            </h1>
</div>
<!-- Auth Card -->
<div class="bg-card/80 backdrop-blur-xl border border-border/50 rounded-xl shadow-[0_0_40px_rgba(11,16,32,0.8)] glow-effect transition-all duration-300 overflow-hidden">
<!-- Tab Navigation -->
<div class="flex border-b border-border/50 bg-surface-container-low/50">
<button class="flex-1 py-4 text-center font-label-md text-label-md border-b-2 border-primary text-primary transition-colors hover:bg-surface-container-high/30" id="tab-login" onclick="switchTab('login')">
                    Login
                </button>
<button class="flex-1 py-4 text-center font-label-md text-label-md border-b-2 border-transparent text-text-muted hover:text-text-main transition-colors hover:bg-surface-container-high/30" id="tab-register" onclick="switchTab('register')">
                    Register
                </button>
</div>
<div class="p-8">
<!-- Login View -->
<div class="tab-content active" id="view-login">
<div class="mb-8 text-center">
<h2 class="font-headline-md text-headline-md text-text-main mb-2">Enter the Guild Hall</h2>
<p class="font-body-sm text-body-sm text-text-muted">Continue your journey and manage your quests.</p>
</div>
<form class="space-y-5" onsubmit="event.preventDefault();">
<div>
<label class="block font-label-md text-label-md text-text-soft mb-2">Email Scroll Address</label>
<div class="relative">
<span class="material-symbols-outlined absolute left-3 top-1/2 -translate-y-1/2 text-text-muted">mail</span>
<input class="w-full bg-surface-container-low border border-border rounded-lg pl-10 pr-4 py-3 text-text-main focus:border-primary focus:ring-1 focus:ring-primary focus:outline-none transition-colors font-body-md placeholder:text-text-muted/50" placeholder="adventurer@guild.com" type="email"/>
</div>
</div>
<div>
<div class="flex justify-between items-center mb-2">
<label class="block font-label-md text-label-md text-text-soft">Secret Passphrase</label>
<a class="font-label-sm text-label-sm text-primary hover:text-primary-fixed-dim transition-colors" href="#">Forgot rune?</a>
</div>
<div class="relative">
<span class="material-symbols-outlined absolute left-3 top-1/2 -translate-y-1/2 text-text-muted">key</span>
<input class="w-full bg-surface-container-low border border-border rounded-lg pl-10 pr-4 py-3 text-text-main focus:border-primary focus:ring-1 focus:ring-primary focus:outline-none transition-colors font-body-md placeholder:text-text-muted/50" placeholder="••••••••" type="password"/>
</div>
</div>
<div class="flex items-center">
<input class="w-4 h-4 rounded border-border bg-surface-container-low text-primary focus:ring-primary focus:ring-offset-background-main" id="remember" type="checkbox"/>
<label class="ml-2 font-body-sm text-body-sm text-text-muted" for="remember">Remember my aura</label>
</div>
<button class="w-full bg-primary-container text-on-primary-container font-label-md text-label-md py-3 px-4 rounded-lg shadow-[0_0_15px_rgba(124,58,237,0.3)] hover:shadow-[0_0_25px_rgba(124,58,237,0.5)] hover:-translate-y-0.5 transition-all duration-300 flex justify-center items-center gap-2" type="submit">
<span>Unlock Gates</span>
<span class="material-symbols-outlined text-[18px]">login</span>
</button>
</form>
</div>
<!-- Register View -->
<div class="tab-content" id="view-register">
<div class="mb-8 text-center">
<h2 class="font-headline-md text-headline-md text-secondary mb-2">Begin Your Adventure</h2>
<p class="font-body-sm text-body-sm text-text-muted">Create your adventurer account and start leveling up your productivity.</p>
</div>
<form class="space-y-5" onsubmit="event.preventDefault();">
<div>
<label class="block font-label-md text-label-md text-text-soft mb-2">Adventurer Name</label>
<div class="relative">
<span class="material-symbols-outlined absolute left-3 top-1/2 -translate-y-1/2 text-text-muted">person</span>
<input class="w-full bg-surface-container-low border border-border rounded-lg pl-10 pr-4 py-3 text-text-main focus:border-secondary focus:ring-1 focus:ring-secondary focus:outline-none transition-colors font-body-md placeholder:text-text-muted/50" placeholder="e.g. Lancelot" type="text"/>
</div>
</div>
<div>
<label class="block font-label-md text-label-md text-text-soft mb-2">Email Scroll Address</label>
<div class="relative">
<span class="material-symbols-outlined absolute left-3 top-1/2 -translate-y-1/2 text-text-muted">mail</span>
<input class="w-full bg-surface-container-low border border-border rounded-lg pl-10 pr-4 py-3 text-text-main focus:border-secondary focus:ring-1 focus:ring-secondary focus:outline-none transition-colors font-body-md placeholder:text-text-muted/50" placeholder="adventurer@guild.com" type="email"/>
</div>
</div>
<div>
<label class="block font-label-md text-label-md text-text-soft mb-2">Secret Passphrase</label>
<div class="relative">
<span class="material-symbols-outlined absolute left-3 top-1/2 -translate-y-1/2 text-text-muted">key</span>
<input class="w-full bg-surface-container-low border border-border rounded-lg pl-10 pr-4 py-3 text-text-main focus:border-secondary focus:ring-1 focus:ring-secondary focus:outline-none transition-colors font-body-md placeholder:text-text-muted/50" placeholder="••••••••" type="password"/>
</div>
</div>
<button class="w-full bg-gradient-to-r from-warning to-gold-dark text-on-secondary font-label-md text-label-md py-3 px-4 rounded-lg shadow-[0_0_15px_rgba(245,158,11,0.2)] hover:shadow-[0_0_25px_rgba(245,158,11,0.4)] hover:-translate-y-0.5 transition-all duration-300 flex justify-center items-center gap-2 mt-2" type="submit">
<span>Join the Guild</span>
<span class="material-symbols-outlined text-[18px]">swords</span>
</button>
</form>
</div>
</div>
</div>
<!-- Footer Links -->
<div class="mt-6 text-center space-x-4 font-body-sm text-body-sm text-text-muted">
<a class="hover:text-primary transition-colors" href="#">Guild Code</a>
<span>•</span>
<a class="hover:text-primary transition-colors" href="#">Support Tavern</a>
</div>
</main>
<script>
        function switchTab(tab) {
            // Hide all content
            document.querySelectorAll('.tab-content').forEach(el => {
                el.classList.remove('active');
            });
            
            // Reset all tabs
            document.getElementById('tab-login').className = "flex-1 py-4 text-center font-label-md text-label-md border-b-2 border-transparent text-text-muted hover:text-text-main transition-colors hover:bg-surface-container-high/30";
            document.getElementById('tab-register').className = "flex-1 py-4 text-center font-label-md text-label-md border-b-2 border-transparent text-text-muted hover:text-text-main transition-colors hover:bg-surface-container-high/30";
            
            if(tab === 'login') {
                document.getElementById('view-login').classList.add('active');
                document.getElementById('tab-login').className = "flex-1 py-4 text-center font-label-md text-label-md border-b-2 border-primary text-primary transition-colors hover:bg-surface-container-high/30";
            } else {
                document.getElementById('view-register').classList.add('active');
                document.getElementById('tab-register').className = "flex-1 py-4 text-center font-label-md text-label-md border-b-2 border-secondary text-secondary transition-colors hover:bg-surface-container-high/30";
            }
        }
    </script>
</body></html>
