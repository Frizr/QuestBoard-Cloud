<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1920 1080" preserveAspectRatio="xMidYMid slice">
  <defs>
    <radialGradient id="purpleGlow" cx="25%" cy="30%" r="65%">
      <stop offset="0%" stop-color="#6D28D9" stop-opacity=".7"/>
      <stop offset="45%" stop-color="#0B1020" stop-opacity=".4"/>
      <stop offset="100%" stop-color="#050816" stop-opacity="1"/>
    </radialGradient>
    <radialGradient id="goldGlow" cx="76%" cy="42%" r="45%">
      <stop offset="0%" stop-color="#FBBF24" stop-opacity=".38"/>
      <stop offset="58%" stop-color="#111827" stop-opacity=".22"/>
      <stop offset="100%" stop-color="#050816" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="floor" x1="0" x2="0" y1="0" y2="1">
      <stop offset="0%" stop-color="#050816" stop-opacity="0"/>
      <stop offset="80%" stop-color="#050816" stop-opacity=".92"/>
    </linearGradient>
    <filter id="blur">
      <feGaussianBlur stdDeviation="18"/>
    </filter>
  </defs>
  <rect width="1920" height="1080" fill="#050816"/>
  <rect width="1920" height="1080" fill="url(#purpleGlow)">
    <animate attributeName="opacity" values=".75;.95;.75" dur="9s" repeatCount="indefinite"/>
  </rect>
  <rect width="1920" height="1080" fill="url(#goldGlow)">
    <animate attributeName="opacity" values=".45;.7;.45" dur="12s" repeatCount="indefinite"/>
  </rect>
  <g opacity=".18" stroke="#8B5CF6" stroke-width="2">
    <path d="M420 890 960 220l540 670" fill="none"/>
    <path d="M520 890 960 330l440 560" fill="none"/>
    <path d="M640 890 960 450l320 440" fill="none"/>
  </g>
  <g filter="url(#blur)" opacity=".55">
    <circle cx="430" cy="330" r="18" fill="#8B5CF6">
      <animate attributeName="cy" values="330;260;330" dur="8s" repeatCount="indefinite"/>
    </circle>
    <circle cx="1460" cy="390" r="14" fill="#FBBF24">
      <animate attributeName="cy" values="390;320;390" dur="10s" repeatCount="indefinite"/>
    </circle>
    <circle cx="980" cy="230" r="20" fill="#38BDF8">
      <animate attributeName="opacity" values=".2;.55;.2" dur="7s" repeatCount="indefinite"/>
    </circle>
  </g>
  <g opacity=".16" fill="#CBD5E1">
    <circle cx="270" cy="180" r="2"/>
    <circle cx="570" cy="250" r="1.5"/>
    <circle cx="890" cy="170" r="2"/>
    <circle cx="1160" cy="260" r="1.5"/>
    <circle cx="1550" cy="190" r="2"/>
    <circle cx="1720" cy="310" r="1.5"/>
  </g>
  <rect width="1920" height="1080" fill="url(#floor)"/>
</svg>
